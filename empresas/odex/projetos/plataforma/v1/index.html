iv></div>'; }
    function renderStore(){ $('view-loja').innerHTML=head('Loja','Painel')+'<section class="hero"><div><div class="text-xs uppercase tracking-widest text-white/45 mb-4">Catálogo Solar</div><h2>Equipamentos que <em>fazem projetos</em> acontecerem.</h2><p>Painéis fotovoltaicos, inversores e estruturas com leitura rápida de potência e disponibilidade, pensado para integrador.</p><a class="pill-btn" href="#loja"><i data-lucide="boxes" size="15"></i>Monte seu kit</a></div><img src="'+ASSET+'painel%20solar%20esquerda.png" alt="Kit Solar"></section><div class="store"><div class="toolbar"><div class="search"><i data-lucide="search" size="16"></i><input id="search" placeholder="Buscar por código, nome ou marca..."></div><button class="cart-trigger" onclick="openCart()"><i data-lucide="shopping-bag" size="17"></i>Carrinho <span class="badge" id="cartBadge">0</span></button></div><div class="tabs"><button class="tab active">Painel</button><button class="tab">Módulos</button><button class="tab">Inversor</button><button class="tab">Baterias</button><button class="tab">String Box</button><button class="tab">Estruturas</button><button class="tab">Acessórios</button></div><aside class="filters"><p class="filter-title">Preço</p><div class="price-inputs"><input id="minPrice" value="0"><input id="maxPrice" value="1000"></div><p class="filter-title">Marca</p><div class="checks" id="brands">'+['Huasun','Astronergy','Odex','Jinko'].map(b=>'<label><input type="checkbox" value="'+b+'"> '+b+'</label>').join('')+'</div><p class="filter-title">Tecnologia</p><div class="checks" id="techs">'+['Bifacial','N-Type','HJT','Monofacial'].map(t=>'<label><input type="checkbox" value="'+t+'"> '+t+'</label>').join('')+'</div></aside><section><div class="catalog-head"><p>Exibindo <strong id="count">0</strong> de <span>'+products.length+'</span> produtos</p><select id="sort" class="border rounded px-3 py-2"><option value="featured">Destaques</option><option value="price-asc">Menor preço</option><option value="price-desc">Maior preço</option></select></div><div class="grid" id="grid"></div><div class="empty" id="empty">Nenhum produto encontrado.</div></section></div>'; bindStore(); renderCatalog(); updateCart(); }
    function bindStore(){ $('search').oninput=e=>{state.search=e.target.value.toLowerCase();renderCatalog()}; $('sort').onchange=e=>{state.sort=e.target.value;renderCatalog()}; ['brands','techs'].forEach(id=>document.querySelectorAll('#'+id+' input').forEach(i=>i.onchange=()=>{state.brands=new Set([...document.querySelectorAll('#brands input:checked')].map(x=>x.value));state.tech=new Set([...document.querySelectorAll('#techs input:checked')].map(x=>x.value));renderCatalog()})); ['minPrice','maxPrice'].forEach(id=>$(id).oninput=renderCatalog); }
    function renderCatalog(){ if(!$('grid'))return; let min=+$('minPrice').value||0,max=+$('maxPrice').value||1000; let list=products.filter(p=>(p.name.toLowerCase().includes(state.search)||p.sku.includes(state.search)||p.brand.toLowerCase().includes(state.search))&&p.price>=min&&p.price<=max&&(state.brands.size===0||state.brands.has(p.brand))&&(state.tech.size===0||p.tech.some(t=>state.tech.has(t)))); if(state.sort==='price-asc')list.sort((a,b)=>a.price-b.price); if(state.sort==='price-desc')list.sort((a,b)=>b.price-a.price); $('grid').innerHTML=list.map(p=>'<div class="product"><a href="#produto-'+p.sku+'" class="product-img"><img src="'+p.img+'" alt="'+p.name+'"></a><div class="product-info"><div class="sku">SKU '+p.sku+'</div><a href="#produto-'+p.sku+'"><h3>'+p.name+'</h3></a><div><span class="stars">'+stars(p.rating)+'</span> <span class="text-xs">'+p.rating+' ('+p.reviews+')</span></div><div class="tags"><span class="tag">'+p.power+'W</span><span class="tag">'+p.eff+'</span><span class="tag">'+p.brand+'</span></div><div class="product-foot"><div>'+(p.available?'<div class="price">'+fmt(p.price)+'</div><span class="tax">c/ IPI e ST</span>':'')+'</div>'+(p.available?'<div class="actions"><button onclick="addCart(\''+p.sku+'\',1)">+</button><button class="add" onclick="addCart(\''+p.sku+'\',1)"><i data-lucide="shopping-bag" size="16"></i></button></div>':'<span class="text-sm text-gray-500">Sob consulta</span>')+'</div></div></div>').join(''); $('count').textContent=list.length; $('empty').style.display=list.length?'none':'block'; lucide.createIcons(); }
    function renderProduct(sku){ const p=products.find(x=>x.sku===sku)||products[0]; const related=products.filter(x=>x.sku!==p.sku).slice(0,4); $('view-produto').innerHTML=head('Produto','Loja')+'<nav class="breadcrumb"><a href="#loja">Loja</a><span>/</span><span>'+p.brand+' '+p.power+'W</span></nav><div class="product-hero"><div><div class="gallery-main"><img id="mainImg" src="'+p.img2+'" alt="'+p.name+'"></div><div class="thumbs"><button class="thumb active" onclick="switchImg(\''+p.img2+'\',this)"><img src="'+p.img2+'"></button><button class="thumb" onclick="switchImg(\''+p.img+'\',this)"><img src="'+p.img+'"></button><button class="thumb" onclick="switchImg(\''+ASSET+'painel%20solar%20esquerda.png\',this)"><img src="'+ASSET+'painel%20solar%20esquerda.png"></button></div></div><aside class="panel"><div class="flex justify-between"><small class="font-bold uppercase text-gray-500">'+p.brand+'</small><span class="availability '+(p.available?'in':'')+'">'+(p.available?'Em Estoque':'Sob Consulta')+'</span></div><h2 class="text-xl font-bold my-3">'+p.name+'</h2><div><span class="stars">'+stars(p.rating)+'</span> '+p.rating+' ('+p.reviews+' avaliações)</div><div class="price-card"><div class="price-big">'+fmt(p.price)+'</div><div class="text-xs text-gray-500">Total c/ IPI + ST + Prêmio: <strong>'+fmt(p.price)+'</strong></div></div><button class="checkout mb-3" '+(!p.available?'disabled':'')+' onclick="addCart(\''+p.sku+'\',1)">'+(p.available?'Adicionar ao Carrinho':'Indisponível')+'</button><button class="w-full h-[42px] border rounded-[14px] bg-white">Solicitar Orçamento</button><div class="meta mt-5"><div><small>SKU</small>'+p.sku+'</div><div><small>EAN</small>'+p.ean+'</div><div><small>Marca</small>'+p.brand+'</div><div><small>Filial</small>PR</div><div><small>Modelo</small>'+p.model+'</div><div><small>Múltiplo</small>1</div></div></aside></div><div class="features">'+features().map(f=>'<div class="feature"><div class="feature-icon"><i data-lucide="'+f.icon+'" size="18"></i></div><div><strong>'+f.label+'</strong><p class="text-xs text-gray-500 mt-1">'+f.desc+'</p></div></div>').join('')+'</div>'+sectionSpecs(p)+sectionReviews()+'<h2 class="text-xl font-bold mb-4">Produtos Relacionados</h2><div class="related">'+related.map(r=>'<a class="rel-card" href="#produto-'+r.sku+'"><img src="'+r.img2+'"><div class="p-4"><strong class="text-sm">'+r.name+'</strong><div class="mt-2">'+(r.available?fmt(r.price):'Sob consulta')+'</div></div></a>').join('')+'</div>'; lucide.createIcons(); }
    function features(){return[{icon:'layers',label:'Bifacial',desc:'Captação solar pelas duas faces.'},{icon:'atom',label:'N-Type / HJT',desc:'Alta eficiência e menor degradação.'},{icon:'shield-check',label:'INMETRO',desc:'Certificação nacional.'},{icon:'star',label:'Tier 1',desc:'Fornecedores reconhecidos.'},{icon:'thermometer',label:'Baixa perda térmica',desc:'Mais estabilidade no calor.'},{icon:'clock',label:'Garantia longa',desc:'Desempenho linear por décadas.'}]}
    function sectionSpecs(p){ const e={'Potência Nominal':p.power+' Wp','Eficiência':p.eff,'Temperatura de Operação':'−40°C ~ +85°C','Caixa de Junção':'IP68'}, f={'Modelo':p.model,'Marca':p.brand,'Conector':'MC4 compatível','Garantia':'25 a 30 anos'}; const rows=o=>Object.entries(o).map(([k,v])=>'<div class="spec-row"><span>'+k+'</span><strong>'+v+'</strong></div>').join(''); return '<section class="section"><p class="filter-title">Ficha tecnica</p><h2>Especificações do produto</h2><div class="specs"><div>'+rows(e)+'</div><div>'+rows(f)+'</div></div></section>' }
    function sectionReviews(){return '<section class="section"><p class="filter-title">Prova de campo</p><h2>Avaliações de integradores</h2>'+['Produto excelente, dentro das especificações e com boa entrega.','Geração surpreendeu no primeiro mês de uso.','Boa certificação e acabamento competitivo.'].map((t,i)=>'<div class="review"><strong>'+['Rafael M.','Carla S.','Thiago R.'][i]+'</strong><div class="stars">★★★★★</div><p class="text-sm text-gray-600">'+t+'</p></div>').join('')+'</section>'}
    window.switchImg=(src,el)=>{ $('mainImg').src=src; document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); el.classList.add('active') };
    function addCart(sku,qty){ state.cart[sku]=(state.cart[sku]||0)+qty; updateCart(); openCart(); }
    function updateCart(){ let entries=Object.entries(state.cart),count=0,total=0; $('cartBody').innerHTML=entries.length?entries.map(([sku,qty])=>{let p=products.find(x=>x.sku===sku); count+=qty; total+=qty*p.price; return '<div class="cart-item"><img src="'+p.img+'"><div><strong class="text-sm">'+p.name+'</strong><div>'+fmt(p.price)+'</div><div>Qtd: '+qty+'</div></div></div>'}).join(''):'<div class="text-center text-gray-400 mt-12">Seu carrinho está vazio.</div>'; document.querySelectorAll('#cartBadge').forEach(b=>{b.textContent=count;b.style.display=count?'grid':'none'}); $('cartSubtotal').textContent=fmt(total); $('cartTotal').textContent=fmt(total); lucide.createIcons(); }
    function openCart(){ $('cartOverlay').classList.add('open'); $('cart').classList.add('open'); document.body.classList.add('no-scroll') } function closeCart(){ $('cartOverlay').classList.remove('open'); $('cart').classList.remove('open'); document.body.classList.remove('no-scroll') } $('closeCart').onclick=closeCart; $('cartOverlay').onclick=closeCart;
    function route(){ const hash=(location.hash||'#dashboard').slice(1),m=hash.match(/^produto-(.+)$/),view=m?'produto':hash==='loja'?'loja':'dashboard'; document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); $('view-'+view).classList.add('active'); document.querySelectorAll('.nav-link').forEach(a=>a.classList.remove('active')); document.querySelectorAll('[data-nav="'+(view==='produto'?'loja':view)+'"]').forEach(a=>a.classList.add('active')); if(view==='dashboard')renderDashboard(); if(view==='loja')renderStore(); if(view==='produto')renderProduct(m[1]); document.title=(view==='dashboard'?'Dashboard':view==='loja'?'Loja':'Produto')+' - Plataforma Odex'; window.scrollTo(0,0); lucide.createIcons(); }
    window.addEventListener('hashchange',route); route(); updateCart();
  </script>
</body>
</html>
