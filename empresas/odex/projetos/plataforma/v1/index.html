<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma Odex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* Modern SaaS CSS */
      :root {
        --blue: #005aff;
        --navy: #0d1d52;
        --sidebar-bg: #091338;
        --ink: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --bg: #f9fafb;
        --soft: #f3f4f6;
        --amber: #f59e0b;
        --green: #10b981;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        --r: 12px;
        --rx: 16px;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--ink); }
      body.no-scroll { overflow: hidden; }
      a { text-decoration: none; color: inherit; }
      button, input, select { font: inherit; outline: none; }
      button { border: 0; cursor: pointer; }
      
      /* Sidebar */
      .sidebar {
        width: 252px;
        background: var(--sidebar-bg);
        color: white;
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        height: 100vh;
        z-index: 20;
        border-right: 1px solid rgba(255,255,255,0.09);
        box-shadow: 1px 0 0 rgba(255,255,255,0.04), 4px 0 24px rgba(0,0,0,0.18);
        border-radius: 0 22px 22px 0;
      }
      .sidebar-header {
        height: 72px;
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .sidebar-header img { height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
      .sidebar-nav { flex: 1; padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
      .sidebar-link {
        display: flex; align-items: center; gap: 12px; padding: 10px 14px;
        border-radius: 8px; color: #9ca3af; font-size: 14px; font-weight: 500; transition: 0.2s;
      }
      .sidebar-link i { width: 18px; text-align: center; font-size: 16px; }
      .sidebar-link:hover { color: white; background: rgba(255,255,255,0.05); }
      .sidebar-link.active { color: white; background: var(--blue); }
      .sidebar-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 16px 0; }
      
      /* Main Content */
      .main { margin-left: 286px; min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        height: 72px; background: white; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 32px; position: sticky; top: 0; z-index: 10;
      }
      .topbar-title { margin: 0; font-size: 20px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
      .topbar-title small { color: var(--muted); font-weight: 400; font-size: 14px; }
      .topbar-actions { display: flex; align-items: center; gap: 20px; }
      .icon-btn { position: relative; width: 40px; height: 40px; border-radius: 50%; background: var(--bg); display: grid; place-items: center; color: var(--muted); transition: 0.2s; }
      .icon-btn:hover { background: var(--line); color: var(--ink); }
      .icon-btn .dot { position: absolute; top: 8px; right: 10px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 2px solid white; }
      .badge { position: absolute; top: 4px; right: 4px; background: var(--blue); color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; line-height: 1; border: 2px solid white; display: none; }
      .user-profile { display: flex; align-items: center; gap: 12px; padding-left: 20px; border-left: 1px solid var(--line); cursor: pointer; }
      .user-profile img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
      .user-profile .info { display: flex; flex-direction: column; }
      .user-profile .name { font-size: 14px; font-weight: 600; color: var(--ink); }
      .user-profile .role { font-size: 12px; color: var(--muted); }
      
      .shell { padding: 24px 24px 32px; flex: 1; max-width: none; width: 100%; margin: 0; }
      .view { display: none; }
      .view.active { display: block; animation: fadeIn 0.3s; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .card { background: white; border-radius: var(--r); box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
      
      /* Dashboard Specific */
      .dash-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
      .dash-kpi { padding: 24px; position: relative; overflow: hidden; }
      .dash-kpi-icon { position: absolute; top: 24px; right: 24px; width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; opacity: 0.8; }
      .kpi-blue { background: #eff6ff; color: #3b82f6; }
      .kpi-green { background: #ecfdf5; color: #10b981; }
      .kpi-amber { background: #fffbeb; color: #f59e0b; }
      .kpi-purple { background: #f3e8ff; color: #8b5cf6; }
      .dash-kpi h4 { margin: 0 0 8px; color: var(--muted); font-size: 14px; font-weight: 500; }
      .dash-kpi-value { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 12px; display: flex; align-items: baseline; gap: 4px; }
      .dash-kpi-value small { font-size: 16px; font-weight: 600; color: var(--muted); }
      .dash-kpi-trend { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
      .trend-up { color: var(--green); }
      .trend-down { color: #ef4444; }
      
      /* Vitrine / Carousel Area */
      .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
      .section-header h3 { margin: 0; font-size: 18px; font-weight: 600; color: var(--ink); }
      .section-header p { margin: 4px 0 0; font-size: 14px; color: var(--muted); }
      .btn-link { color: var(--blue); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
      .btn-link:hover { text-decoration: underline; }
      .vitrine { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
      
      /* Budget Table Layout */
      .dash-bottom { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
      .table-card { padding: 24px; display: flex; flex-direction: column; min-height: 400px; }
      .table-filters { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
      .input-group { position: relative; flex: 1; }
      .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
      .input-group input { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px 0 36px; font-size: 14px; }
      .date-input { height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px; font-size: 14px; color: var(--ink); }
      
      /* Store Layout */
      .store-layout { display: flex; gap: 24px; align-items: flex-start; }
      .filters { width: 260px; flex-shrink: 0; position: sticky; top: 96px; padding: 24px; }
      .catalog { flex: 1; }
      .catalog-head { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: var(--muted); align-items: center; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
      .product { background: white; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--line); transition: 0.2s; display: flex; flex-direction: column; position: relative; }
      .product:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #cbd5e1; z-index: 2; }
      .product-img { background: white; aspect-ratio: 1; padding: 20px; display: grid; place-items: center; position: relative; border-bottom: 1px solid var(--line); }
      .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
      .product-badge { position: absolute; top: 12px; left: 12px; background: var(--blue); color: white; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; z-index: 5; }
      .product-info { padding: 20px; flex: 1; display: flex; flex-direction: column; background: #fafafa; }
      .sku { font-size: 12px; color: var(--muted); font-family: monospace; }
      .product h3 { font-size: 15px; font-weight: 600; line-height: 1.4; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--navy); }
      .tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0 auto; }
      .tag { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 500; color: var(--muted); }
      .product-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
      .price { font-size: 20px; font-weight: 700; color: var(--ink); }
      .btn-add { background: var(--blue); color: white; width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; transition: 0.2s; }
      .btn-add:hover { background: #0046cc; }
      .btn-add:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
      
      /* Cart Overrides */
      .cart-overlay { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(4px); z-index: 40; opacity: 0; pointer-events: none; transition: 0.3s; }
      .cart-overlay.open { opacity: 1; pointer-events: auto; }
      .cart { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 100%; background: white; z-index: 50; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -20px 0 40px rgba(0,0,0,0.1); }
      .cart.open { transform: translateX(0); }
      .cart-head { padding: 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
      .cart-head strong { font-size: 18px; font-weight: 600; }
      .cart-close { background: var(--bg); width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: var(--muted); }
      
      /* Product Page Overrides */
      .product-hero { display: grid; grid-template-columns: 1fr 440px; gap: 40px; margin-bottom: 40px; }
      .gallery-main { background: white; border: 1px solid var(--line); border-radius: var(--r); aspect-ratio: 4/3; padding: 40px; display: grid; place-items: center; }
      .thumb { background: white; border: 1px solid var(--line); }
      .thumb.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

      /* Restored store experience */
      .hero { position: relative; background: #1d1d1f; color: white; border-radius: 28px; padding: 44px 52px; margin-bottom: 28px; display: flex; justify-content: space-between; gap: 32px; overflow: hidden; }
      .hero:after { content: ""; position: absolute; top: -60px; right: 260px; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(0,90,255,.18), transparent 70%); }
      .hero h2 { font-size: clamp(28px, 3vw, 44px); line-height: 1.08; margin: 0; letter-spacing: -.03em; max-width: 560px; }
      .hero em { font-style: normal; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .hero p { color: rgba(255,255,255,.55); line-height: 1.6; max-width: 480px; margin: 16px 0 0; }
      .hero img { width: 380px; max-width: 35vw; position: relative; z-index: 2; mask-image: radial-gradient(ellipse 78% 82% at 58% 50%, black 20%, rgba(0,0,0,.6) 45%, transparent 70%); }
      .pill-btn { display: inline-flex; align-items: center; gap: 8px; height: 42px; padding: 0 20px; border-radius: 999px; background: white; color: var(--ink); font-weight: 600; margin-top: 24px; }
      .store { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
      .toolbar, .tabs { grid-column: 1 / -1; }
      .toolbar { display: flex; justify-content: space-between; gap: 14px; padding: 10px; border-radius: 20px; background: white; box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
      .search { position: relative; flex: 1; max-width: 520px; }
      .search i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
      .search input { width: 100%; height: 42px; border: 1.5px solid transparent; border-radius: 14px; background: var(--soft); padding: 0 42px; }
      .cart-trigger { height: 42px; border: 1.5px solid var(--line); background: white; border-radius: 14px; padding: 0 18px; font-weight: 600; display: flex; align-items: center; gap: 9px; color: var(--ink); }
      .store-cart-badge { display: none; place-items: center; background: var(--blue); color: white; border-radius: 10px; height: 20px; min-width: 20px; font-size: 11px; font-weight: 700; padding: 0 6px; }
      .tabs { display: flex; flex-wrap: wrap; gap: 7px; }
      .tab { height: 34px; border: 1.5px solid var(--line); border-radius: 999px; background: white; color: var(--muted); padding: 0 16px; font-size: 13px; font-weight: 500; }
      .tab.active { background: #1d1d1f; border-color: #1d1d1f; color: white; }
      .filters { position: sticky; top: 96px; padding: 24px; border-radius: 20px; background: white; box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
      .filter-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
      .checks { display: grid; gap: 12px; margin-bottom: 28px; }
      .checks label { display: flex; gap: 10px; align-items: center; color: #3a3a3c; font-size: 14px; cursor: pointer; }
      .price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
      .price-inputs input { width: 100%; height: 36px; border: 1.5px solid var(--line); border-radius: 10px; background: var(--soft); padding: 0 8px; }
      .catalog-head strong { color: var(--ink); }
      .catalog-sort { border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; background: white; font-size: 14px; }
      .product { border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06), 0 0 1px rgba(0,0,0,.04); border: 0; }
      .product-img { display: block; background: var(--soft); padding: 0; border-bottom: 0; aspect-ratio: auto; }
      .product-img img { width: 100%; display: block; max-width: none; max-height: none; object-fit: cover; mix-blend-mode: normal; }
      .product-info { padding: 16px 18px 18px; background: white; }
      .sku { font-size: 11px; color: var(--muted); letter-spacing: .02em; font-family: inherit; }
      .product h3 { font-size: 14px; line-height: 1.4; margin: 6px 0 10px; color: var(--ink); }
      .stars { color: var(--amber); font-size: 13px; }
      .tag { background: var(--soft); border: 0; border-radius: 6px; padding: 3px 9px; font-size: 11px; color: var(--ink); }
      .product-foot { align-items: flex-end; gap: 12px; margin-top: 0; }
      .price { font-size: 22px; font-weight: 700; letter-spacing: -.03em; }
      .tax { font-size: 11px; color: var(--muted); }
      .actions { display: flex; height: 38px; background: var(--soft); border-radius: 10px; overflow: hidden; }
      .actions button { width: 34px; background: transparent; color: var(--ink); }
      .actions .add { width: 44px; background: var(--blue); color: white; display: grid; place-items: center; }
      .empty { display: none; text-align: center; padding: 72px 20px; background: white; border-radius: 20px; box-shadow: var(--shadow-sm); color: var(--muted); border: 1px solid var(--line); }
      .store-page .toolbar { align-items: center; }
      .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--muted); color: white; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
      .search input:not(:placeholder-shown) ~ .search-clear { display: flex; }
      .category-bar { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 7px; }
      .category-btn { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 16px; border: 1.5px solid var(--line); border-radius: 99px; background: white; color: var(--muted); font-size: 13px; font-weight: 500; transition: all 180ms ease; }
      .category-btn:hover { border-color: var(--ink); color: var(--ink); }
      .category-btn.active { background: #1d1d1f; border-color: #1d1d1f; color: white; }
      .filter-group { margin-bottom: 28px; }
      .filter-group:last-child { margin-bottom: 0; }
      .price-slider-container { margin-bottom: 16px; position: relative; height: 40px; }
      .price-track, .price-fill { position: absolute; top: 50%; transform: translateY(-50%); height: 3px; border-radius: 2px; }
      .price-track { width: 100%; background: var(--line); }
      .price-fill { background: #1d1d1f; z-index: 1; }
      .price-slider-container input[type="range"] { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; -webkit-appearance: none; appearance: none; background: transparent; pointer-events: none; z-index: 2; }
      .price-slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: white; border: 2px solid #1d1d1f; pointer-events: auto; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
      .price-input-wrapper { position: relative; }
      .price-input-wrapper span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; }
      .price-input-wrapper input { padding-left: 28px; }
      .catalog-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
      .catalog-header p { margin: 0; font-size: 13px; color: var(--muted); }
      .catalog-controls { display: flex; align-items: center; gap: 10px; }
      .view-toggle { display: inline-flex; align-items: center; gap: 2px; padding: 3px; border: 1.5px solid var(--line); border-radius: 10px; background: white; }
      .view-btn { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 7px; background: transparent; color: var(--muted); }
      .view-btn:hover { background: var(--soft); color: var(--ink); }
      .view-btn.active { background: #1d1d1f; color: white; }
      .product-card { background: white; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,.06), 0 0 1px rgba(0,0,0,.04); transition: transform 300ms ease, box-shadow 300ms ease; }
      .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
      .product-image { position: relative; display: block; background: var(--soft); overflow: hidden; }
      .product-image img { width: 100%; height: auto; display: block; transition: transform 300ms ease; }
      .product-card:hover .product-image img { transform: scale(1.03); }
      .product-sku { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: .02em; }
      .product-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; margin: 0 0 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .product-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
      .rating-val { font-size: 12px; font-weight: 600; color: #3a3a3c; }
      .rating-count { font-size: 12px; color: var(--muted); }
      .product-specs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
      .spec-tag { padding: 3px 9px; background: var(--soft); color: #3a3a3c; font-size: 11px; font-weight: 500; border-radius: 6px; }
      .product-footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-top: auto; }
      .price-block .price { font-size: 22px; font-weight: 700; color: var(--ink); margin: 0; line-height: 1; letter-spacing: -.03em; }
      .price-block .unavailable-text { font-size: 14px; font-weight: 500; color: var(--muted); margin: 0; }
      .action-pill { display: flex; align-items: center; background: var(--soft); border-radius: 10px; overflow: hidden; height: 38px; }
      .action-pill button { height: 100%; display: grid; place-items: center; background: transparent; color: var(--ink); }
      .action-pill .qty-btn { width: 34px; font-size: 16px; }
      .action-pill .qty-val { width: 28px; text-align: center; font-size: 14px; font-weight: 600; }
      .action-pill .add-btn { width: 44px; background: var(--blue); color: white; }
      .grid.list-view { display: flex; flex-direction: column; gap: 14px; }
      .grid.list-view .product-card { display: grid; grid-template-columns: 280px minmax(0, 1fr); }
      .grid.list-view .product-card:hover { transform: translateY(-3px); }
      .grid.list-view .product-image { min-height: 200px; background: #111; border-right: 1px solid var(--line); }
      .grid.list-view .product-image img { width: 100%; height: 100%; object-fit: contain; }
      .grid.list-view .product-info { padding: 24px 28px; }
      .empty-state { display: none; text-align: center; padding: 72px 20px; background: white; border-radius: 20px; color: var(--muted); box-shadow: var(--shadow-sm); }
      .empty-state h3 { font-size: 17px; font-weight: 600; color: var(--ink); margin: 0 0 10px; }
      .empty-state p { font-size: 14px; margin: 0 0 24px; }
      .empty-state button { padding: 10px 20px; border: 1.5px solid var(--line); background: white; border-radius: 14px; font-size: 14px; font-weight: 500; color: var(--ink); }
      
      @media (max-width: 1024px) {
        .sidebar { transform: translateX(-100%); }
        .main { margin-left: 0; }
        .dash-kpis { grid-template-columns: repeat(2, 1fr); }
        .vitrine { grid-template-columns: repeat(2, 1fr); }
        .dash-bottom { grid-template-columns: 1fr; }
        .store { grid-template-columns: 1fr; }
        .store-layout { flex-direction: column; }
        .filters { width: 100%; position: static; }
        .product-hero { grid-template-columns: 1fr; }
        .hero img { display: none; }
        .grid.list-view .product-card { grid-template-columns: 1fr; }

      function bindStore() {
        $("search").oninput = (e) => { state.search = e.target.value.toLowerCase(); renderCatalog(); };
        $("searchClear").onclick = () => { $("search").value = ""; state.search = ""; renderCatalog(); };
        $("sort").onchange = (e) => { state.sort = e.target.value; renderCatalog(); };
        ["brands", "techs"].forEach((id) =>
          document.querySelectorAll("#" + id + " input").forEach(
            (i) => (i.onchange = () => {
                state.brands = new Set([...document.querySelectorAll("#brands input:checked")].map((x) => x.value));
                state.tech = new Set([...document.querySelectorAll("#techs input:checked")].map((x) => x.value));
                renderCatalog();
            })
          )
        );
        const updatePriceSlider = () => {
          let minVal = parseInt($("rangeMin").value) || 0;
          let maxVal = parseInt($("rangeMax").value) || 1000;
          if (minVal > maxVal) [minVal, maxVal] = [maxVal, minVal];
          state.minPrice = minVal;
          state.maxPrice = maxVal;
          $("minPrice").value = minVal;
          $("maxPrice").value = maxVal;
          const minPct = minVal / 1000 * 100;
          const maxPct = maxVal / 1000 * 100;
          $("priceFill").style.left = minPct + "%";
          $("priceFill").style.width = (maxPct - minPct) + "%";
          renderCatalog();
        };
        const updatePriceInputs = () => {
          state.minPrice = Math.max(0, parseInt($("minPrice").value) || 0);
          state.maxPrice = Math.min(1000, parseInt($("maxPrice").value) || 1000);
          $("rangeMin").value = state.minPrice;
          $("rangeMax").value = state.maxPrice;
          updatePriceSlider();
        };
        $("rangeMin").oninput = updatePriceSlider;
        $("rangeMax").oninput = updatePriceSlider;
        $("minPrice").onchange = updatePriceInputs;
        $("maxPrice").onchange = updatePriceInputs;
        document.querySelectorAll(".view-btn").forEach((btn) => btn.onclick = () => {
          state.view = btn.dataset.view;
          document.querySelectorAll(".view-btn").forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
          renderCatalog();
        });
        document.querySelectorAll(".category-btn").forEach((btn) => btn.onclick = () => {
          state.category = btn.dataset.category;
          document.querySelectorAll(".category-btn").forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
          renderCatalog();
        });
        $("clearFilters").onclick = () => {
          state.search = "";
          state.minPrice = 0;
          state.maxPrice = 1000;
          state.brands = new Set();
          state.tech = new Set();
          state.category = "Painel";
          renderStore();
        };
        updatePriceSlider();
      }

      function renderCatalog() {
        if (!$("grid")) return;
        if (state.category !== "Painel") {
          $("grid").innerHTML = "";
          $("count").textContent = "0";
          $("empty").style.display = "block";
          $("empty").querySelector("h3").textContent = "Categoria em desenvolvimento";
          $("empty").querySelector("p").textContent = "Essa categoria já fica preparada para receber produtos.";
          return;
        }
        let list = products.filter(
          (p) =>
            (p.name.toLowerCase().includes(state.search) || p.sku.includes(state.search) || p.brand.toLowerCase().includes(state.search)) &&
            p.price >= state.minPrice && p.price <= state.maxPrice &&
            (state.brands.size === 0 || state.brands.has(p.brand)) &&
            (state.tech.size === 0 || p.tech.some((t) => state.tech.has(t)))
        );
        if (state.sort === "price-asc") list.sort((a, b) => a.price - b.price);
        if (state.sort === "price-desc") list.sort((a, b) => b.price - a.price);
        
        $("grid").innerHTML = list.map(productCardHTML).join("");
        $("grid").classList.toggle("list-view", state.view === "list");
        $("count").textContent = list.length;
        $("empty").style.display = list.length ? "none" : "block";
        if (!list.length) {
          $("empty").querySelector("h3").textContent = "Nenhum produto encontrado";
          $("empty").querySelector("p").textContent = "Tente ajustar os filtros ou limpar sua busca.";
        }
        lucide.createIcons();
      }

      window.updateTempQty = (sku, delta) => {
        state.tempQty[sku] = Math.max(1, (state.tempQty[sku] || 1) + delta);
        renderCatalog();
      };

      function addCart(sku, qty) {
        state.cart[sku] = (state.cart[sku] || 0) + qty;
        updateCart();
        openCart();
      }

      function adjustCart(sku, delta) {
        const newQty = (state.cart[sku] || 0) + delta;
        if (newQty <= 0) delete state.cart[sku];
        else state.cart[sku] = newQty;
        updateCart();
      }

      function removeCart(sku) {
        delete state.cart[sku];
        updateCart();
      }

      function updateCart() {
        let entries = Object.entries(state.cart), count = 0, total = 0;
        $("cartBody").innerHTML = entries.length
          ? entries.map(([sku, qty]) => {
              let p = products.find((x) => x.sku === sku);
              count += qty; total += qty * p.price;
              return `
                <div class="cart-item">
                  <div class="cart-item-img">
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='${ASSET}logo-odex.png'">
                  </div>
                  <div class="cart-item-content">
                    <p class="cart-item-name">${p.name}</p>
                    <p class="cart-item-price">${fmt(p.price)}</p>
                    <div class="cart-item-controls">
                      <div class="cart-qty">
                        <button onclick="adjustCart('${sku}',-1)">−</button>
                        <span>${qty}</span>
                        <button onclick="adjustCart('${sku}',1)">+</button>
                      </div>
                      <button class="cart-remove-btn" onclick="removeCart('${sku}')">Remover</button>
                    </div>
                  </div>
                </div>
              `;
            }).join("")
          : `<div class="cart-empty">
               <div class="cart-empty-icon"><i data-lucide="shopping-cart" style="width:26px;height:26px;opacity:0.4;"></i></div>
               <h3>Carrinho vazio</h3>
               <p>Adicione produtos para montar seu orçamento.</p>
             </div>`;

        const tag = $("cartCountTag");
        if (tag) tag.textContent = count + (count === 1 ? " item" : " itens");

        document.querySelectorAll("#cartBadge, .store-cart-badge").forEach((b) => {
          b.textContent = count;
          b.style.display = count ? (b.classList.contains("store-cart-badge") ? "grid" : "block") : "none";
        });
        $("cartSubtotal").textContent = fmt(total);
        $("cartTotal").textContent = fmt(total);
        lucide.createIcons();
      }

      function openCart() {
        $("cartOverlay").classList.add("open");
        $("cart").classList.add("open");
        document.body.classList.add("no-scroll");
      }
      function closeCart() {
        $("cartOverlay").classList.remove("open");
        $("cart").classList.remove("open");
        document.body.classList.remove("no-scroll");
      }
      $("closeCart").onclick = closeCart;
      $("cartOverlay").onclick = closeCart;

      function route() {
        const hash = (location.hash || "#dashboard").slice(1),
          m = hash.match(/^produto-(.+)$/);
        const view = m ? "produto"
          : hash === "loja" ? "loja"
          : hash === "perfil" ? "perfil"
          : hash === "configuracoes" ? "configuracoes"
          : hash === "orcamento" ? "orcamento"
          : "dashboard";

        document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
        $("view-" + view).classList.add("active");

        document.querySelectorAll(".nav-link").forEach((a) => a.classList.remove("active"));
        document.querySelectorAll('[data-nav="' + (view === "produto" ? "loja" : view) + '"]').forEach((a) => a.classList.add("active"));

        if (view === "dashboard") renderDashboard();
        if (view === "loja") renderStore();
        if (view === "produto") renderProduct(m[1]);
        if (view === "perfil") renderPerfil();
        if (view === "configuracoes") renderConfiguracoes();
        if (view === "orcamento") renderOrcamento();

        // close notifications on navigate
        $("notifPanel")?.classList.remove("open");
        $("userMenu")?.classList.remove("open");
        window.scrollTo(0, 0);
        lucide.createIcons();
      }

      window.addEventListener("hashchange", route);
      route();
      updateCart();
    </script>
  </body>
</html>
