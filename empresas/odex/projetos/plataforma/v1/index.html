<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma Odex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* Modern SaaS CSS */
      :root {
        --blue: #005aff;
        --navy: #0d1d52;
        --sidebar-bg: #091338;
        --ink: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --bg: #f9fafb;
        --soft: #f3f4f6;
        --amber: #f59e0b;
        --green: #10b981;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        --r: 12px;
        --rx: 16px;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--ink); }
      body.no-scroll { overflow: hidden; }
      a { text-decoration: none; color: inherit; }
      button, input, select { font: inherit; outline: none; }
      button { border: 0; cursor: pointer; }
      
      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        color: white;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
        z-index: 20;
        border-right: 1px solid rgba(255,255,255,0.05);
      }
      .sidebar-header {
        height: 72px;
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .sidebar-header img { height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
      .sidebar-nav { flex: 1; padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
      .sidebar-link {
        display: flex; align-items: center; gap: 12px; padding: 10px 14px;
        border-radius: 8px; color: #9ca3af; font-size: 14px; font-weight: 500; transition: 0.2s;
      }
      .sidebar-link i { width: 18px; text-align: center; font-size: 16px; }
      .sidebar-link:hover { color: white; background: rgba(255,255,255,0.05); }
      .sidebar-link.active { color: white; background: var(--blue); }
      .sidebar-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 16px 0; }
      
      /* Main Content */
      .main { margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
      .topbar {
        height: 72px; background: white; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 32px; position: sticky; top: 0; z-index: 10;
      }
      .topbar-title { margin: 0; font-size: 20px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
      .topbar-title small { color: var(--muted); font-weight: 400; font-size: 14px; }
      .topbar-actions { display: flex; align-items: center; gap: 20px; }
      .icon-btn { position: relative; width: 40px; height: 40px; border-radius: 50%; background: var(--bg); display: grid; place-items: center; color: var(--muted); transition: 0.2s; }
      .icon-btn:hover { background: var(--line); color: var(--ink); }
      .icon-btn .dot { position: absolute; top: 8px; right: 10px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 2px solid white; }
      .badge { position: absolute; top: 4px; right: 4px; background: var(--blue); color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; line-height: 1; border: 2px solid white; display: none; }
      .user-profile { display: flex; align-items: center; gap: 12px; padding-left: 20px; border-left: 1px solid var(--line); cursor: pointer; }
      .user-profile img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
      .user-profile .info { display: flex; flex-direction: column; }
      .user-profile .name { font-size: 14px; font-weight: 600; color: var(--ink); }
      .user-profile .role { font-size: 12px; color: var(--muted); }
      
      .shell { padding: 32px; flex: 1; max-width: 1440px; width: 100%; margin: 0 auto; }
      .view { display: none; }
      .view.active { display: block; animation: fadeIn 0.3s; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .card { background: white; border-radius: var(--r); box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
      
      /* Dashboard Specific */
      .dash-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
      .dash-kpi { padding: 24px; position: relative; overflow: hidden; }
      .dash-kpi-icon { position: absolute; top: 24px; right: 24px; width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; opacity: 0.8; }
      .kpi-blue { background: #eff6ff; color: #3b82f6; }
      .kpi-green { background: #ecfdf5; color: #10b981; }
      .kpi-amber { background: #fffbeb; color: #f59e0b; }
      .kpi-purple { background: #f3e8ff; color: #8b5cf6; }
      .dash-kpi h4 { margin: 0 0 8px; color: var(--muted); font-size: 14px; font-weight: 500; }
      .dash-kpi-value { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 12px; display: flex; align-items: baseline; gap: 4px; }
      .dash-kpi-value small { font-size: 16px; font-weight: 600; color: var(--muted); }
      .dash-kpi-trend { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
      .trend-up { color: var(--green); }
      .trend-down { color: #ef4444; }
      
      /* Vitrine / Carousel Area */
      .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
      .section-header h3 { margin: 0; font-size: 18px; font-weight: 600; color: var(--ink); }
      .section-header p { margin: 4px 0 0; font-size: 14px; color: var(--muted); }
      .btn-link { color: var(--blue); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
      .btn-link:hover { text-decoration: underline; }
      .vitrine { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
      
      /* Budget Table Layout */
      .dash-bottom { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
      .table-card { padding: 24px; display: flex; flex-direction: column; min-height: 400px; }
      .table-filters { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
      .input-group { position: relative; flex: 1; }
      .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
      .input-group input { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px 0 36px; font-size: 14px; }
      .date-input { height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px; font-size: 14px; color: var(--ink); }
      
      /* Store Layout */
      .store-layout { display: flex; gap: 24px; align-items: flex-start; }
      .filters { width: 260px; flex-shrink: 0; position: sticky; top: 96px; padding: 24px; }
      .catalog { flex: 1; }
      .catalog-head { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: var(--muted); align-items: center; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
      .product { background: white; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--line); transition: 0.2s; display: flex; flex-direction: column; position: relative; }
      .product:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #cbd5e1; z-index: 2; }
      .product-img { background: white; aspect-ratio: 1; padding: 20px; display: grid; place-items: center; position: relative; border-bottom: 1px solid var(--line); }
      .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
      .product-badge { position: absolute; top: 12px; left: 12px; background: var(--blue); color: white; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; z-index: 5; }
      .product-info { padding: 20px; flex: 1; display: flex; flex-direction: column; background: #fafafa; }
      .sku { font-size: 12px; color: var(--muted); font-family: monospace; }
      .product h3 { font-size: 15px; font-weight: 600; line-height: 1.4; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--navy); }
      .tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0 auto; }
      .tag { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 500; color: var(--muted); }
      .product-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
      .price { font-size: 20px; font-weight: 700; color: var(--ink); }
      .btn-add { background: var(--blue); color: white; width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; transition: 0.2s; }
      .btn-add:hover { background: #0046cc; }
      .btn-add:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
      
      /* Cart Overrides */
      .cart-overlay { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(4px); z-index: 40; opacity: 0; pointer-events: none; transition: 0.3s; }
      .cart-overlay.open { opacity: 1; pointer-events: auto; }
      .cart { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 100%; background: white; z-index: 50; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -20px 0 40px rgba(0,0,0,0.1); }
      .cart.open { transform: translateX(0); }
      .cart-head { padding: 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
      .cart-head strong { font-size: 18px; font-weight: 600; }
      .cart-close { background: var(--bg); width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: var(--muted); }
      
      /* Product Page Overrides */
      .product-hero { display: grid; grid-template-columns: 1fr 440px; gap: 40px; margin-bottom: 40px; }
      .gallery-main { background: white; border: 1px solid var(--line); border-radius: var(--r); aspect-ratio: 4/3; padding: 40px; display: grid; place-items: center; }
      .thumb { background: white; border: 1px solid var(--line); }
      .thumb.active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
      
      @media (max-width: 1024px) {
        .sidebar { transform: translateX(-100%); }
        .main { margin-left: 0; }
        .dash-kpis { grid-template-columns: repeat(2, 1fr); }
        .vitrine { grid-template-columns: repeat(2, 1fr); }
        .dash-bottom { grid-template-columns: 1fr; }
        .store-layout { flex-direction: column; }
        .filters { width: 100%; position: static; }
        .product-hero { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="https://www.figma.com/api/mcp/asset/3228d54b-2ded-4da1-857c-e62be8a5ec61" alt="Odex Logo" />
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" data-nav="dashboard" class="sidebar-link nav-link active">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </a>
        <a href="#loja" class="sidebar-link">
          <i data-lucide="package-plus"></i> Monte Seu Kit
        </a>
        <a href="#loja" data-nav="loja" class="sidebar-link nav-link">
          <i data-lucide="shopping-cart"></i> Loja
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="file-text"></i> Orçamentos
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="calculator"></i> Calculadora
        </a>
        <div class="sidebar-divider"></div>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="list-ordered"></i> Pedidos
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="users"></i> Clientes
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="bar-chart-2"></i> Relatórios
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="award"></i> Prêmio Venda Direta
        </a>
        <div style="flex: 1"></div>
        <div class="sidebar-divider"></div>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="settings"></i> Configurações
        </a>
        <a href="#dashboard" class="sidebar-link">
          <i data-lucide="user"></i> Perfil
        </a>
        <a href="#dashboard" class="sidebar-link" style="color: #f87171;">
          <i data-lucide="log-out"></i> Sair
        </a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar" id="topbar">
        <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="openCart()">
            <i data-lucide="shopping-cart"></i>
            <span class="badge" id="cartBadge">0</span>
          </button>
          <button class="icon-btn">
            <i data-lucide="bell"></i>
            <div class="dot"></div>
          </button>
          <div class="user-profile">
            <div class="info text-right">
              <span class="name">Gabriel Barbosa</span>
              <span class="role">Integrador Solar</span>
            </div>
            <img src="https://ui-avatars.com/api/?name=Gabriel+Barbosa&background=005aff&color=fff" alt="User">
            <i data-lucide="chevron-down" style="width: 16px; color: var(--muted);"></i>
          </div>
        </div>
      </header>

      <div class="shell">
        <section id="view-dashboard" class="view active"></section>
        <section id="view-loja" class="view"></section>
        <section id="view-produto" class="view"></section>
      </div>
    </main>

    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart" id="cart">
      <div class="cart-head">
        <strong>Carrinho de Compras</strong>
        <button class="cart-close" id="closeCart"><i data-lucide="x" style="width:18px;"></i></button>
      </div>
      <div class="cart-body" id="cartBody"></div>
      <div class="cart-foot" style="background: white; border-top: 1px solid var(--line);">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--muted); font-size:14px;">
          <span>Subtotal</span><span id="cartSubtotal">R$ 0,00</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:20px; font-weight:700;">
          <span>Total</span><span id="cartTotal">R$ 0,00</span>
        </div>
        <button class="checkout" style="background:var(--blue); color:white; width:100%; height:48px; border-radius:10px; font-weight:600;">
          Finalizar Orçamento
        </button>
      </div>
    </aside>

    <script>
      const ASSET = "../../website/versoes/v2/assets/";
      const R = ASSET + "imagens%20retangulares/ChatGPT%20Image%206%20de%20mai.%20de%202026%2C%2013_41_";
      const Q = ASSET + "imagens-quadradas/ChatGPT%20Image%206%20de%20mai.%20de%202026%2C%2013_38_";
      const products = [
        { sku: "337702", ean: "33770200", name: "Painel Solar Fotovoltaico Huasun 700W HJT 132 Células Bifacial", brand: "Huasun", tech: ["Bifacial", "HJT"], power: 700, eff: "22,53%", price: 645, available: true, rating: 4.8, reviews: 28, img: R.replace("13_41_", "13_57_34.png"), img2: Q + "07%20(1).png", model: "HS-210-B132DS700" },
        { sku: "345436", ean: "34543600", name: "Painel Solar Fotovoltaico Astronergy Bifacial 580W N-Type", brand: "Astronergy", tech: ["Bifacial", "N-Type"], power: 580, eff: "22,5%", price: 529, available: true, rating: 4.6, reviews: 15, img: R + "47%20(1).png", img2: Q + "08%20(2).png", model: "CHSM72M(DG)/F-BH 580W" },
        { sku: "343662", ean: "34366200", name: "Painel Solar Fotovoltaico Jinko 625W Tiger Neo Bifacial N-Type", brand: "Jinko", tech: ["Bifacial", "N-Type"], power: 625, eff: "23,14%", price: 589, available: false, rating: 4.7, reviews: 42, img: R + "48%20(2).png", img2: Q + "08%20(3).png", model: "JKM625N-78HL4-BDV" },
        { sku: "300585", ean: "30058500", name: "Painel Solar Fotovoltaico Odex 610W N-Type 132 Células Bifacial", brand: "Odex", tech: ["Bifacial", "N-Type"], power: 610, eff: "22,7%", price: 548, available: false, rating: 4.5, reviews: 19, img: R + "48%20(3).png", img2: Q + "08%20(4).png", model: "ODX-610N-132BF" },
        { sku: "320473", ean: "32047300", name: "Painel Solar Fotovoltaico Odex 585W Monofacial N-Type 144 Células", brand: "Odex", tech: ["Monofacial", "N-Type"], power: 585, eff: "22,65%", price: 512, available: false, rating: 4.4, reviews: 11, img: R + "48%20(4).png", img2: Q + "10%20(5).png", model: "ODX-585N-144MF" },
        { sku: "299589", ean: "29958900", name: "Painel Solar Fotovoltaico Jinko 610W Tiger Neo Bifacial N-Type", brand: "Jinko", tech: ["Bifacial", "N-Type"], power: 610, eff: "22,58%", price: 552, available: false, rating: 4.9, reviews: 33, img: R + "49%20(5).png", img2: Q + "10%20(6).png", model: "JKM610N-78HL4-BDV" }
      ];
      const state = { cart: {}, search: "", brands: new Set(), tech: new Set(), sort: "featured" };
      const $ = (id) => document.getElementById(id);
      const fmt = (v) => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
      const stars = (r) => "★".repeat(Math.floor(r)) + (r % 1 >= 0.5 ? "½" : "") + "☆".repeat(5 - Math.floor(r) - (r % 1 >= 0.5 ? 1 : 0));

      function updatePageTitle(title, sub = "") {
        $("pageTitle").innerHTML = title + (sub ? ` <small>/ ${sub}</small>` : "");
      }

      function productCardHTML(p) {
        return `
          <div class="product">
            <a href="#produto-${p.sku}" class="product-img">
              ${p.available ? '<span class="product-badge">Estoque</span>' : ''}
              <img src="${p.img}" alt="${p.name}">
            </a>
            <div class="product-info">
              <div class="sku">SKU ${p.sku}</div>
              <a href="#produto-${p.sku}"><h3>${p.name}</h3></a>
              <div class="tags">
                <span class="tag">${p.power}W</span>
                <span class="tag">${p.brand}</span>
              </div>
              <div class="product-foot">
                ${p.available 
                  ? `<div><div class="price">${fmt(p.price)}</div><div style="font-size:11px;color:var(--muted)">c/ IPI e ST</div></div>
                     <button class="btn-add" onclick="addCart('${p.sku}',1)"><i data-lucide="plus"></i></button>`
                  : `<div style="font-size:14px; font-weight:600; color:var(--muted)">Sob consulta</div>
                     <button class="btn-add" disabled><i data-lucide="plus"></i></button>`
                }
              </div>
            </div>
          </div>
        `;
      }

      function renderDashboard() {
        updatePageTitle("Dashboard", "Visão Geral");
        const topProducts = products.slice(0, 4).map(productCardHTML).join("");
        
        $("view-dashboard").innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div class="dash-period" style="margin:0;">
              <span style="font-weight:500; font-size: 14px; color: var(--muted)">Mês de Referência:</span>
              <input type="month" value="2026-05" style="border:1px solid var(--line); border-radius:8px; padding:6px 12px; font-size:14px; background:white; margin-left:10px;">
            </div>
          </div>
          
          <div class="dash-kpis">
            <div class="card dash-kpi">
              <div class="dash-kpi-icon kpi-blue"><i data-lucide="dollar-sign" style="width:24px;height:24px;"></i></div>
              <h4>Vendas no Mês</h4>
              <div class="dash-kpi-value"><small>R$</small> 142.500,00</div>
              <div class="dash-kpi-trend trend-up"><i data-lucide="trending-up" style="width:14px;"></i> 12.5% vs mês anterior</div>
            </div>
            <div class="card dash-kpi">
              <div class="dash-kpi-icon kpi-green"><i data-lucide="shopping-bag" style="width:24px;height:24px;"></i></div>
              <h4>Pedidos Fechados</h4>
              <div class="dash-kpi-value">34</div>
              <div class="dash-kpi-trend trend-up"><i data-lucide="trending-up" style="width:14px;"></i> 4 vs mês anterior</div>
            </div>
            <div class="card dash-kpi">
              <div class="dash-kpi-icon kpi-amber"><i data-lucide="clock" style="width:24px;height:24px;"></i></div>
              <h4>Orçamentos Pendentes</h4>
              <div class="dash-kpi-value">12</div>
              <div class="dash-kpi-trend" style="color:var(--muted);"><i data-lucide="minus" style="width:14px;"></i> Estável</div>
            </div>
            <div class="card dash-kpi">
              <div class="dash-kpi-icon kpi-purple"><i data-lucide="zap" style="width:24px;height:24px;"></i></div>
              <h4>Potência Vendida</h4>
              <div class="dash-kpi-value">280 <small>kWp</small></div>
              <div class="dash-kpi-trend trend-up"><i data-lucide="trending-up" style="width:14px;"></i> 8.2% vs mês anterior</div>
            </div>
          </div>

          <div class="section-header">
            <div>
              <h3>Promoções e Destaques</h3>
              <p>Equipamentos à pronta-entrega na sua região</p>
            </div>
            <a href="#loja" class="btn-link">Ver todo o catálogo <i data-lucide="arrow-right" style="width:16px;"></i></a>
          </div>
          <div class="vitrine">
            ${topProducts}
          </div>

          <div class="dash-bottom">
            <div class="card table-card">
              <div class="section-header" style="margin-bottom:24px;">
                <h3>Meus Orçamentos</h3>
                <a href="#" class="btn-link">Ver todos</a>
              </div>
              <div class="table-filters">
                <div class="input-group">
                  <i data-lucide="search" style="width:16px;"></i>
                  <input type="text" placeholder="Buscar orçamento por cliente ou código...">
                </div>
                <input type="date" class="date-input">
                <button class="btn-add" style="width:auto; padding:0 16px; border-radius:8px;"><i data-lucide="filter" style="width:16px;"></i> Filtrar</button>
              </div>
              <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted);">
                <i data-lucide="file-question" style="width:48px;height:48px; opacity:0.5; margin-bottom:16px;"></i>
                <p>Nenhum orçamento encontrado neste período.</p>
                <button class="btn-link" style="margin-top:8px;" onclick="location.hash='#loja'">Criar novo orçamento</button>
              </div>
            </div>
            <div class="card table-card">
               <div class="section-header">
                <h3>Avisos Importantes</h3>
              </div>
              <div style="margin-top:16px; display:flex; flex-direction:column; gap:16px;">
                <div style="padding:16px; background:#eff6ff; border-radius:8px; border:1px solid #bfdbfe;">
                  <strong style="display:block; color:#1e40af; font-size:14px; margin-bottom:4px;">Novo Lote Huasun</strong>
                  <p style="margin:0; font-size:13px; color:#3b82f6;">Módulos 700W disponíveis no CD Sul a partir de 10/Maio.</p>
                </div>
                <div style="padding:16px; background:#fffbeb; border-radius:8px; border:1px solid #fde68a;">
                  <strong style="display:block; color:#b45309; font-size:14px; margin-bottom:4px;">Atualização de Frete</strong>
                  <p style="margin:0; font-size:13px; color:#d97706;">Novas tabelas de frete para a região Nordeste.</p>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderStore() {
        updatePageTitle("Loja", "Catálogo de Equipamentos");
        $("view-loja").innerHTML = `
          <div class="store-layout">
            <aside class="card filters">
              <h3 style="margin:0 0 20px; font-size:16px;">Filtros</h3>
              
              <div style="margin-bottom: 24px;">
                <label style="display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:12px;">Busca</label>
                <div class="input-group">
                  <i data-lucide="search" style="width:16px;"></i>
                  <input id="search" type="text" placeholder="Código, marca..." style="height:36px; font-size:13px;">
                </div>
              </div>

              <div style="margin-bottom: 24px;">
                <label style="display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:12px;">Marca</label>
                <div id="brands" style="display:flex; flex-direction:column; gap:10px;">
                  ${["Huasun", "Astronergy", "Odex", "Jinko"].map(b => `<label style="display:flex; gap:8px; font-size:14px; color:var(--ink); cursor:pointer;"><input type="checkbox" value="${b}"> ${b}</label>`).join("")}
                </div>
              </div>

              <div style="margin-bottom: 24px;">
                <label style="display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:12px;">Tecnologia</label>
                <div id="techs" style="display:flex; flex-direction:column; gap:10px;">
                  ${["Bifacial", "N-Type", "HJT", "Monofacial"].map(t => `<label style="display:flex; gap:8px; font-size:14px; color:var(--ink); cursor:pointer;"><input type="checkbox" value="${t}"> ${t}</label>`).join("")}
                </div>
              </div>
            </aside>
            <div class="catalog">
              <div class="catalog-head">
                <div>Exibindo <strong id="count">0</strong> produtos</div>
                <select id="sort" style="padding:8px 12px; border:1px solid var(--line); border-radius:8px; background:white; font-size:14px; outline:none;">
                  <option value="featured">Relevância</option>
                  <option value="price-asc">Menor Preço</option>
                  <option value="price-desc">Maior Preço</option>
                </select>
              </div>
              <div class="grid" id="grid"></div>
              <div id="empty" style="display:none; text-align:center; padding:64px; background:white; border-radius:var(--r); color:var(--muted);">
                <i data-lucide="package-search" style="width:48px;height:48px; opacity:0.5; margin:0 auto 16px;"></i>
                <p>Nenhum produto encontrado com os filtros selecionados.</p>
              </div>
            </div>
          </div>
        `;
        bindStore();
        renderCatalog();
      }

      function bindStore() {
        $("search").oninput = (e) => { state.search = e.target.value.toLowerCase(); renderCatalog(); };
        $("sort").onchange = (e) => { state.sort = e.target.value; renderCatalog(); };
        ["brands", "techs"].forEach((id) =>
          document.querySelectorAll("#" + id + " input").forEach(
            (i) => (i.onchange = () => {
                state.brands = new Set([...document.querySelectorAll("#brands input:checked")].map((x) => x.value));
                state.tech = new Set([...document.querySelectorAll("#techs input:checked")].map((x) => x.value));
                renderCatalog();
            })
          )
        );
      }

      function renderCatalog() {
        if (!$("grid")) return;
        let list = products.filter(
          (p) =>
            (p.name.toLowerCase().includes(state.search) || p.sku.includes(state.search) || p.brand.toLowerCase().includes(state.search)) &&
            (state.brands.size === 0 || state.brands.has(p.brand)) &&
            (state.tech.size === 0 || p.tech.some((t) => state.tech.has(t)))
        );
        if (state.sort === "price-asc") list.sort((a, b) => a.price - b.price);
        if (state.sort === "price-desc") list.sort((a, b) => b.price - a.price);
        
        $("grid").innerHTML = list.map(productCardHTML).join("");
        $("count").textContent = list.length;
        $("empty").style.display = list.length ? "none" : "block";
        lucide.createIcons();
      }

      function renderProduct(sku) {
        const p = products.find((x) => x.sku === sku) || products[0];
        updatePageTitle("Detalhes do Produto", p.sku);
        
        $("view-produto").innerHTML = `
          <div class="product-hero">
            <div>
              <div class="gallery-main">
                <img id="mainImg" src="${p.img2}" alt="${p.name}">
              </div>
              <div class="thumbs" style="display:flex; gap:12px; margin-top:16px;">
                <button class="thumb active" onclick="switchImg('${p.img2}',this)" style="width:80px;height:80px;border-radius:10px;padding:8px;"><img src="${p.img2}" style="width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;"></button>
                <button class="thumb" onclick="switchImg('${p.img}',this)" style="width:80px;height:80px;border-radius:10px;padding:8px;"><img src="${p.img}" style="width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;"></button>
              </div>
            </div>
            <aside class="card" style="padding:32px; position:sticky; top:96px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                <span style="background:var(--soft); color:var(--navy); font-weight:600; font-size:12px; padding:4px 10px; border-radius:6px; text-transform:uppercase;">${p.brand}</span>
                ${p.available ? '<span style="color:var(--green); font-size:13px; font-weight:600; display:flex; align-items:center; gap:4px;"><i data-lucide="check-circle-2" style="width:16px;"></i> Pronta Entrega</span>' : '<span style="color:var(--muted); font-size:13px; font-weight:600;">Sob consulta</span>'}
              </div>
              <h2 style="font-size:24px; line-height:1.3; margin:0 0 12px; color:var(--ink);">${p.name}</h2>
              <div style="display:flex; gap:8px; align-items:center; color:var(--amber); font-size:14px; margin-bottom:24px;">
                ${stars(p.rating)} <span style="color:var(--muted); font-size:13px;">(${p.reviews} avaliações)</span>
              </div>
              <div style="background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:24px;">
                <div style="font-size:32px; font-weight:800; color:var(--ink); line-height:1;">${fmt(p.price)}</div>
                <div style="font-size:13px; color:var(--muted); margin-top:8px;">Total com IPI + ST inclusos.</div>
              </div>
              <button onclick="addCart('${p.sku}',1)" ${!p.available ? "disabled" : ""} style="width:100%; height:52px; background:var(--blue); color:white; border-radius:12px; font-size:16px; font-weight:600; display:flex; justify-content:center; align-items:center; gap:8px; transition:0.2s; opacity:${!p.available ? '0.5' : '1'}; cursor:${!p.available ? 'not-allowed' : 'pointer'}">
                <i data-lucide="shopping-cart"></i> ${p.available ? "Adicionar ao Orçamento" : "Estoque Indisponível"}
              </button>
              
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:32px; padding-top:24px; border-top:1px solid var(--line); font-size:13px;">
                <div><strong style="display:block; color:var(--muted); margin-bottom:4px;">SKU</strong> ${p.sku}</div>
                <div><strong style="display:block; color:var(--muted); margin-bottom:4px;">EAN</strong> ${p.ean}</div>
                <div><strong style="display:block; color:var(--muted); margin-bottom:4px;">Potência</strong> ${p.power}W</div>
                <div><strong style="display:block; color:var(--muted); margin-bottom:4px;">Tecnologia</strong> ${p.tech.join(", ")}</div>
              </div>
            </aside>
          </div>
        `;
        lucide.createIcons();
      }

      window.switchImg = (src, el) => {
        $("mainImg").src = src;
        document.querySelectorAll(".thumb").forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      };

      function addCart(sku, qty) {
        state.cart[sku] = (state.cart[sku] || 0) + qty;
        updateCart();
        openCart();
      }

      function updateCart() {
        let entries = Object.entries(state.cart), count = 0, total = 0;
        $("cartBody").innerHTML = entries.length
          ? entries.map(([sku, qty]) => {
                let p = products.find((x) => x.sku === sku);
                count += qty; total += qty * p.price;
                return `
                  <div style="display:flex; gap:16px; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--line);">
                    <div style="width:72px; height:72px; background:white; border:1px solid var(--line); border-radius:10px; display:grid; place-items:center; padding:8px;">
                      <img src="${p.img}" style="max-width:100%; max-height:100%; object-fit:contain; mix-blend-mode:multiply;">
                    </div>
                    <div style="flex:1;">
                      <h4 style="margin:0 0 4px; font-size:14px; font-weight:600; color:var(--ink);">${p.name}</h4>
                      <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">SKU: ${sku}</div>
                      <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:700; color:var(--blue);">${fmt(p.price)}</span>
                        <span style="font-size:13px; font-weight:500; background:var(--bg); padding:2px 8px; border-radius:6px; border:1px solid var(--line);">Qtd: ${qty}</span>
                      </div>
                    </div>
                  </div>
                `;
              }).join("")
          : '<div style="text-align:center; padding:60px 20px; color:var(--muted);"><i data-lucide="shopping-cart" style="width:48px;height:48px; opacity:0.5; margin:0 auto 16px; display:block;"></i><p>Seu orçamento está vazio.</p></div>';
        
        document.querySelectorAll("#cartBadge").forEach((b) => {
          b.textContent = count;
          b.style.display = count ? "block" : "none";
        });
        $("cartSubtotal").textContent = fmt(total);
        $("cartTotal").textContent = fmt(total);
        lucide.createIcons();
      }

      function openCart() {
        $("cartOverlay").classList.add("open");
        $("cart").classList.add("open");
        document.body.classList.add("no-scroll");
      }
      function closeCart() {
        $("cartOverlay").classList.remove("open");
        $("cart").classList.remove("open");
        document.body.classList.remove("no-scroll");
      }
      $("closeCart").onclick = closeCart;
      $("cartOverlay").onclick = closeCart;

      function route() {
        const hash = (location.hash || "#dashboard").slice(1),
          m = hash.match(/^produto-(.+)$/),
          view = m ? "produto" : hash === "loja" ? "loja" : "dashboard";
        
        document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
        $("view-" + view).classList.add("active");
        
        document.querySelectorAll(".nav-link").forEach((a) => a.classList.remove("active"));
        document.querySelectorAll('[data-nav="' + (view === "produto" ? "loja" : view) + '"]').forEach((a) => a.classList.add("active"));
        
        if (view === "dashboard") renderDashboard();
        if (view === "loja") renderStore();
        if (view === "produto") renderProduct(m[1]);
        
        window.scrollTo(0, 0);
        lucide.createIcons();
      }

      window.addEventListener("hashchange", route);
      route();
      updateCart();
    </script>
  </body>
</html>
