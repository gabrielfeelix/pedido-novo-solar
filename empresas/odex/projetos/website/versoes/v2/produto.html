<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Produto — Odex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --blue: #005aff;
      --blue-hover: #0046c9;
      --blue-light: #e8f0ff;
      --ink: #1d1d1f;
      --ink-2: #3a3a3c;
      --muted: #86868b;
      --line: #e8e8ed;
      --soft: #f5f5f7;
      --green-light: #e8faf0;
      --green-text: #1a7a3a;
      --amber: #f59e0b;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.12), 0 0 1px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--soft);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; outline: none; border: none; }

    /* ─── Header ─── */
    .site-header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(255,255,255,0.85);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .header-inner {
      width: min(1200px, calc(100% - 48px));
      height: 64px; margin: 0 auto;
      display: flex; align-items: center; gap: 32px;
    }
    .logo { display: inline-flex; align-items: center; width: 130px; flex-shrink: 0; }
    .logo img { width: 100%; height: auto; display: block; }
    .nav {
      flex: 1; display: flex; justify-content: center; align-items: center;
      gap: 32px; font-size: 13px; color: var(--ink-2);
    }
    .nav a { font-weight: 400; letter-spacing: -0.01em; opacity: 0.8; transition: opacity 150ms; }
    .nav a:hover { opacity: 1; }
    .nav a.active { opacity: 1; font-weight: 500; }
    .integrator-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 16px; height: 34px; border-radius: 99px;
      color: white; background: var(--blue);
      font-size: 13px; font-weight: 500; flex-shrink: 0;
      transition: background 150ms, transform 150ms;
    }
    .integrator-link:hover { background: var(--blue-hover); transform: translateY(-1px); }

    /* ─── Layout ─── */
    .page { width: min(1200px, calc(100% - 48px)); margin: 0 auto; padding: 24px 0 80px; }

    /* ─── Breadcrumb ─── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .breadcrumb a:hover { color: var(--ink); }
    .breadcrumb .sep { color: var(--line); user-select: none; }
    .breadcrumb .crumb-current { color: var(--ink); font-weight: 500; }

    /* ─── Product Hero ─── */
    .product-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      gap: 28px; align-items: start;
      margin-bottom: 40px;
    }

    /* Gallery */
    .gallery-wrap { display: flex; flex-direction: column; gap: 12px; }
    .gallery-main {
      background: #0c0c0e; border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm); overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-in;
    }
    .gallery-main img {
      width: 100%; height: 100%; object-fit: contain;
      transition: transform 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-main:hover img { transform: scale(1.04); }
    .gallery-thumbs { display: flex; gap: 10px; }
    .gallery-thumb {
      width: 76px; height: 76px; flex-shrink: 0;
      background: #0c0c0e; border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 2px solid transparent; overflow: hidden;
      cursor: pointer; transition: border-color 150ms;
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-thumb.active { border-color: var(--blue); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: contain; }

    /* Info Panel */
    .product-panel {
      position: sticky; top: 80px;
      background: white; border-radius: var(--radius-xl);
      padding: 28px; box-shadow: var(--shadow-sm);
    }
    .prod-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 4px;
    }
    .prod-brand-tag {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    }
    .avail-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .avail-pill.in { background: var(--green-light); color: var(--green-text); }
    .avail-pill.out { background: var(--soft); color: var(--muted); }
    .avail-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .prod-name {
      font-size: 19px; font-weight: 700; color: var(--ink);
      line-height: 1.35; letter-spacing: -0.02em; margin: 8px 0 12px;
    }
    .prod-rating-row {
      display: flex; align-items: center; gap: 7px; margin-bottom: 20px;
    }
    .stars { color: var(--amber); font-size: 13px; letter-spacing: 1px; }
    .rating-num { font-size: 13px; font-weight: 600; color: var(--ink-2); }
    .rating-cnt { font-size: 12px; color: var(--muted); }

    /* Price */
    .price-card {
      background: var(--soft); border-radius: var(--radius-lg);
      padding: 18px 20px; margin-bottom: 14px;
    }
    .price-big {
      font-size: 34px; font-weight: 800;
      letter-spacing: -0.04em; color: var(--ink);
      line-height: 1; margin-bottom: 14px;
    }
    .tax-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 12px; }
    .tax-cell { font-size: 11px; color: var(--muted); line-height: 1.6; }
    .tax-cell strong { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); }
    .price-total-line {
      font-size: 12px; color: var(--muted);
      padding-top: 12px; border-top: 1px solid var(--line);
    }
    .price-total-line strong { color: var(--ink); font-weight: 700; }

    /* Volume table */
    .vol-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
    .vol-table thead th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted); padding: 0 0 8px; text-align: left;
    }
    .vol-table thead th:last-child { text-align: right; }
    .vol-table tbody td { padding: 8px 0; border-top: 1px solid var(--line); color: var(--ink-2); }
    .vol-table tbody td:last-child { text-align: right; font-weight: 700; color: var(--ink); }
    .vol-badge {
      display: inline-block; padding: 2px 7px;
      background: var(--blue-light); color: var(--blue);
      border-radius: 5px; font-size: 10px; font-weight: 700; margin-left: 6px;
    }
    .vol-row-active td { color: var(--blue) !important; }

    /* Actions */
    .prod-actions { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }
    .action-row { display: flex; gap: 9px; }
    .qty-pill {
      display: flex; align-items: center;
      background: var(--soft); border-radius: var(--radius-md);
      height: 48px; overflow: hidden; flex-shrink: 0;
    }
    .qty-pill button {
      width: 42px; height: 100%; background: transparent;
      font-size: 20px; font-weight: 300; color: var(--ink);
      display: grid; place-items: center; transition: background 150ms;
    }
    .qty-pill button:hover { background: rgba(0,0,0,0.07); }
    .qty-pill .qty-num { width: 38px; text-align: center; font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .btn-cart {
      flex: 1; height: 48px; background: var(--blue); color: white;
      border-radius: var(--radius-md); font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 150ms, transform 150ms;
    }
    .btn-cart:hover { background: var(--blue-hover); }
    .btn-cart:active { transform: scale(0.98); }
    .btn-cart:disabled { background: var(--soft); color: var(--muted); cursor: not-allowed; }
    .btn-quote {
      height: 42px; width: 100%; background: white; color: var(--ink);
      border: 1.5px solid var(--line); border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500; transition: background 150ms, border-color 150ms;
    }
    .btn-quote:hover { background: var(--soft); border-color: #c7c7cc; }

    /* Meta */
    .prod-meta {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; padding-top: 20px; border-top: 1px solid var(--line);
    }
    .meta-cell { font-size: 12px; }
    .meta-lbl { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
    .meta-val { font-weight: 600; color: var(--ink); }

    /* ─── Feature Strip ─── */
    .feature-strip {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px; margin-bottom: 40px;
    }
    .feat-card {
      background: white; border-radius: var(--radius-lg); padding: 18px 20px;
      box-shadow: var(--shadow-sm); display: flex; align-items: flex-start; gap: 14px;
      transition: transform 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 250ms;
    }
    .feat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .feat-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--blue-light); border-radius: var(--radius-md);
      display: grid; place-items: center; color: var(--blue);
    }
    .feat-label { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
    .feat-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

    /* ─── Tabs ─── */
    .tabs-wrap {
      background: white; border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 40px;
    }
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--line);
      padding: 0 28px; overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 16px 18px; background: none;
      font-size: 14px; font-weight: 500; color: var(--muted);
      letter-spacing: -0.01em; white-space: nowrap;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 150ms, border-color 150ms;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--blue); font-weight: 600; }
    .tab-pane { padding: 32px 28px; display: none; }
    .tab-pane.active { display: block; }

    /* Specs */
    .specs-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .specs-block-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin: 0 0 14px;
    }
    .spec-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px;
    }
    .spec-row:first-of-type { border-top: 1px solid var(--line); }
    .spec-key { color: var(--muted); flex: 1; }
    .spec-val { font-weight: 600; color: var(--ink); text-align: right; white-space: nowrap; }

    /* Chars */
    .chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .char-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px; background: var(--soft); border-radius: var(--radius-lg);
    }
    .char-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: white; border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); display: grid; place-items: center; color: var(--blue);
    }
    .char-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .char-text { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Docs */
    .doc-list { display: flex; flex-direction: column; gap: 10px; }
    .doc-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border: 1.5px solid var(--line);
      border-radius: var(--radius-lg); background: white;
      transition: border-color 150ms, background 150ms;
    }
    .doc-item:hover { border-color: var(--blue); background: var(--blue-light); }
    .doc-icon { color: var(--blue); flex-shrink: 0; }
    .doc-name { font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; }
    .doc-size { font-size: 12px; color: var(--muted); }

    /* Reviews */
    .reviews-layout { display: grid; grid-template-columns: 200px 1fr; gap: 40px; }
    .rating-summary { display: flex; flex-direction: column; align-items: center; }
    .rating-big { font-size: 60px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .rating-stars-lg { font-size: 22px; color: var(--amber); margin: 6px 0; letter-spacing: 2px; }
    .rating-total { font-size: 12px; color: var(--muted); }
    .rating-bars { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; width: 100%; }
    .rbar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .rbar-label { width: 14px; text-align: right; color: var(--muted); }
    .rbar-track { flex: 1; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .rbar-fill { height: 100%; background: var(--amber); border-radius: 3px; }
    .rbar-count { width: 20px; color: var(--muted); }
    .review-list { display: flex; flex-direction: column; gap: 20px; }
    .review-item { padding-bottom: 20px; border-bottom: 1px solid var(--line); }
    .review-item:last-child { border-bottom: none; padding-bottom: 0; }
    .review-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .reviewer-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--blue-light); color: var(--blue);
      display: grid; place-items: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .reviewer-name { font-size: 13px; font-weight: 600; }
    .reviewer-date { font-size: 12px; color: var(--muted); margin-left: auto; }
    .review-stars { font-size: 12px; color: var(--amber); letter-spacing: 1px; }
    .review-text { font-size: 13px; color: var(--ink-2); line-height: 1.6; margin: 0; }

    /* ─── Related ─── */
    .related-h { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; margin: 0 0 18px; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .rel-card {
      background: white; border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); overflow: hidden;
      transition: transform 280ms cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 280ms;
      display: block;
    }
    .rel-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .rel-img { background: var(--soft); aspect-ratio: 1; }
    .rel-img img { width: 100%; height: 100%; object-fit: contain; padding: 16px; display: block; }
    .rel-info { padding: 14px 16px; }
    .rel-name {
      font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink);
      line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .rel-price { font-size: 16px; font-weight: 700; letter-spacing: -0.03em; color: var(--ink); }
    .rel-avail { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ─── Not Found ─── */
    .not-found {
      text-align: center; padding: 80px 20px;
      background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm);
    }
    .not-found h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 16px 0 8px; }
    .not-found p { color: var(--muted); margin: 0 0 24px; }
    .not-found a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 44px; background: var(--blue); color: white;
      border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
      transition: background 150ms;
    }
    .not-found a:hover { background: var(--blue-hover); }

    /* ─── Responsive ─── */
    @media (max-width: 960px) {
      .product-hero { grid-template-columns: 1fr; }
      .product-panel { position: static; }
      .specs-cols { grid-template-columns: 1fr; gap: 28px; }
      .reviews-layout { grid-template-columns: 1fr; }
      .rating-summary { flex-direction: row; gap: 24px; align-items: center; }
    }
    @media (max-width: 640px) {
      .page { padding: 16px 0 60px; }
      .prod-meta { grid-template-columns: repeat(2, 1fr); }
      .tax-row { grid-template-columns: 1fr 1fr; }
      .nav { display: none; }
      .integrator-link { display: none; }
    }
  </style>
</head>

    const TIERS = [
      {label:'1 unidade',     min:1,  max:1,        disc:0},
      {label:'2–5 unidades',  min:2,  max:5,        disc:0.02},
      {label:'6–10 unidades', min:6,  max:10,       disc:0.04},
      {label:'11+ unidades',  min:11, max:Infinity, disc:null},
    ];

    let qty = 1;

    function fmt(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
    function starsHtml(r) {
      const f=Math.floor(r), h=r%1>=0.5, e=5-f-(h?1:0);
      return '★'.repeat(f)+(h?'½':'')+'☆'.repeat(e);
    }
    function initials(n) { return n.split(' ').slice(0,2).map(x=>x[0]).join(''); }

    function render() {
      const sku = new URLSearchParams(window.location.search).get('sku');
      const root = document.getElementById('pageRoot');
      const p = PRODUCTS[sku];

      if (!p) {
        root.innerHTML = `<div class="not-found">
          <i data-lucide="package-x" size="48" style="color:var(--line)"></i>
          <h2>Produto não encontrado</h2>
          <p>O código <strong>${sku||'informado'}</strong> não corresponde a nenhum produto.</p>
          <a href="loja.html"><i data-lucide="arrow-left" size="16"></i> Voltar à loja</a>
        </div>`;
        lucide.createIcons();
        return;
      }

      document.title = `${p.brand} ${p.name.match(/\d+W/)?.[0]||''} — Odex`;
      const total = p.price + p.ipi + p.st - p.premio;
      const related = Object.values(PRODUCTS).filter(x=>x.sku!==p.sku).slice(0,4);

      root.innerHTML = `
        <nav class="breadcrumb">
          <a href="loja.html">Loja</a><span class="sep">/</span>
          <a href="loja.html">Painel Solar</a><span class="sep">/</span>
          <span class="crumb-current">${p.brand} ${p.name.match(/\d+W/)?.[0]||''}</span>
        </nav>

        <div class="product-hero">
          <div class="gallery-wrap">
            <div class="gallery-main">
              <img id="mainImg" src="${p.imageList}" alt="${p.name}" onerror="this.src='assets/logo-odex.png'">
            </div>
            <div class="gallery-thumbs">
              <div class="gallery-thumb active" onclick="switchImg('${p.imageList}',this)">
                <img src="${p.imageList}" alt="" onerror="this.src='assets/logo-odex.png'">
              </div>
              <div class="gallery-thumb" onclick="switchImg('${p.imageGrid}',this)">
                <img src="${p.imageGrid}" alt="" onerror="this.src='assets/logo-odex.png'">
              </div>
              <div class="gallery-thumb" onclick="switchImg('assets/painel%20solar%20esquerda.png',this)">
                <img src="assets/painel%20solar%20esquerda.png" alt="">
              </div>
            </div>
          </div>

          <div class="product-panel">
            <div class="prod-top">
              <span class="prod-brand-tag">${p.brand}</span>
              <span class="avail-pill ${p.available?'in':'out'}">${p.available?'Em Estoque':'Sob Consulta'}</span>
            </div>
            <h1 class="prod-name">${p.name}</h1>
            <div class="prod-rating-row">
              <span class="stars">${starsHtml(p.rating)}</span>
              <span class="rating-num">${p.rating}</span>
              <span class="rating-cnt">(${p.reviews} avaliações)</span>
            </div>

            <div class="price-card">
              <div class="price-big">${fmt(p.price)}</div>
              <div class="tax-row">
                <div class="tax-cell">IPI<strong>${fmt(p.ipi)}</strong></div>
                <div class="tax-cell">ST<strong>${fmt(p.st)}</strong></div>
                <div class="tax-cell">Prêmio<strong>${fmt(p.premio)}</strong></div>
              </div>
              <div class="price-total-line">
                Total c/ IPI + ST + Prêmio: <strong>${fmt(total)}</strong>
              </div>
            </div>

            <table class="vol-table">
              <thead><tr><th>Quantidade</th><th>Preço / un.</th></tr></thead>
              <tbody>
                ${TIERS.map(t => {
                  const active = qty>=t.min && qty<=t.max;
                  const priceCol = t.disc===null
                    ? `<span style="color:var(--muted);font-weight:500">Consultar</span>`
                    : `${fmt(p.price*(1-t.disc))}${t.disc>0?`<span class="vol-badge">−${t.disc*100}%</span>`:''}`;
                  return `<tr class="${active?'vol-row-active':''}"><td>${t.label}</td><td>${priceCol}</td></tr>`;
                }).join('')}
              </tbody>
            </table>

            <div class="prod-actions">
              <div class="action-row">
                <div class="qty-pill">
                  <button onclick="changeQty(-1)">−</button>
                  <span class="qty-num" id="qtyDisplay">1</span>
                  <button onclick="changeQty(1)">+</button>
                </div>
                <button class="btn-cart" ${!p.available?'disabled':''}>
                  <i data-lucide="shopping-bag" size="17"></i>
                  ${p.available?'Adicionar ao Carrinho':'Indisponível'}
                </button>
              </div>
              <button class="btn-quote">Solicitar Orçamento</button>
            </div>

            <div class="prod-meta">
              <div class="meta-cell"><div class="meta-lbl">SKU</div><div class="meta-val">${p.sku}</div></div>
              <div class="meta-cell"><div class="meta-lbl">EAN</div><div class="meta-val">${p.ean}</div></div>
              <div class="meta-cell"><div class="meta-lbl">Marca</div><div class="meta-val">${p.brand}</div></div>
              <div class="meta-cell"><div class="meta-lbl">Múltiplo</div><div class="meta-val">${p.multiplo}</div></div>
              <div class="meta-cell"><div class="meta-lbl">Filial</div><div class="meta-val">${p.filial}</div></div>
              <div class="meta-cell"><div class="meta-lbl">Modelo</div><div class="meta-val" style="font-size:10px;letter-spacing:0">${p.model}</div></div>
            </div>
          </div>
        </div>

        <div class="feature-strip">
          ${p.features.map(f=>`
            <div class="feat-card">
              <div class="feat-icon"><i data-lucide="${f.icon}" size="18"></i></div>
              <div><div class="feat-label">${f.label}</div><div class="feat-desc">${f.desc}</div></div>
            </div>`).join('')}
        </div>

        <div class="tabs-wrap">
          <div class="tab-bar">
            <button class="tab-btn active" data-tab="specs">Especificações</button>
            <button class="tab-btn" data-tab="chars">Características</button>
            <button class="tab-btn" data-tab="docs">Documentos</button>
            <button class="tab-btn" data-tab="reviews">Avaliações (${p.reviews})</button>
          </div>

          <div class="tab-pane active" id="tab-specs">
            <div class="specs-cols">
              <div>
                <p class="specs-block-title">Dados Elétricos / STC</p>
                ${Object.entries(p.electrical).map(([k,v])=>`
                  <div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`).join('')}
              </div>
              <div>
                <p class="specs-block-title">Dados Físicos</p>
                ${Object.entries(p.physical).map(([k,v])=>`
                  <div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`).join('')}
              </div>
            </div>
          </div>

          <div class="tab-pane" id="tab-chars">
            <div class="chars-grid">
              ${p.features.map(f=>`
                <div class="char-item">
                  <div class="char-icon"><i data-lucide="${f.icon}" size="17"></i></div>
                  <div><div class="char-title">${f.label}</div><div class="char-text">${f.desc}</div></div>
                </div>`).join('')}
            </div>
          </div>

          <div class="tab-pane" id="tab-docs">
            <div class="doc-list">
              ${p.datasheets.length ? p.datasheets.map(d=>`
                <a class="doc-item" href="#" onclick="return false">
                  <div class="doc-icon"><i data-lucide="file-text" size="22"></i></div>
                  <span class="doc-name">${d.name}</span>
                  <span class="doc-size">${d.ext}</span>
                  <i data-lucide="download" size="16" style="color:var(--muted)"></i>
                </a>`).join('') : `<p style="color:var(--muted);font-size:14px">Documentos em breve.</p>`}
            </div>
          </div>

          <div class="tab-pane" id="tab-reviews">
            <div class="reviews-layout">
              <div class="rating-summary">
                <div class="rating-big">${p.rating}</div>
                <div class="rating-stars-lg">${'★'.repeat(Math.round(p.rating))}</div>
                <div class="rating-total">${p.reviews} avaliações</div>
                <div class="rating-bars">
                  ${[5,4,3,2,1].map(s=>{
                    const cnt=p.reviewList.filter(r=>r.stars===s).length;
                    const pct=p.reviews>0?(cnt/p.reviews*100):0;
                    return `<div class="rbar-row">
                      <span class="rbar-label">${s}</span>
                      <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%"></div></div>
                      <span class="rbar-count">${cnt}</span>
                    </div>`;
                  }).join('')}
                </div>
              </div>
              <div>
                ${p.reviewList.length ? `<div class="review-list">${p.reviewList.map(r=>`
                  <div class="review-item">
                    <div class="review-header">
                      <div class="reviewer-avatar">${initials(r.name)}</div>
                      <div><div class="reviewer-name">${r.name}</div><div class="review-stars">${'★'.repeat(r.stars)}</div></div>
                      <span class="reviewer-date">${r.date}</span>
                    </div>
                    <p class="review-text">${r.text}</p>
                  </div>`).join('')}</div>`
                : `<p style="color:var(--muted);font-size:14px;padding-top:8px">Seja o primeiro a avaliar este produto.</p>`}
              </div>
            </div>
          </div>
        </div>

        <div>
          <h2 class="related-h">Produtos Relacionados</h2>
          <div class="related-grid">
            ${related.map(r=>`
              <a href="produto.html?sku=${r.sku}" class="rel-card">
                <div class="rel-img"><img src="${r.imageList}" alt="${r.name}" onerror="this.src='assets/logo-odex.png'"></div>
                <div class="rel-info">
                  <div class="rel-name">${r.name}</div>
                  ${r.available ? `<div class="rel-price">${fmt(r.price)}</div>` : `<div class="rel-avail">Sob consulta</div>`}
                </div>
              </a>`).join('')}
          </div>
        </div>
      `;

      lucide.createIcons();
      bindTabs();
    }

    window.switchImg = (src, el) => {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    };

    window.changeQty = (delta) => {
      qty = Math.max(1, qty + delta);
      const el = document.getElementById('qtyDisplay');
      if (el) el.textContent = qty;
    };

    function bindTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab)?.classList.add('active');
          lucide.createIcons();
        });
      });
    }

    render();
  </script>
